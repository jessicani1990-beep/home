<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品紀錄 App</title>
    <style>
        :root {
            --bg-color: #F5F5F3;
            --accent-color: #8A9A5B;
            --text-color: #4A4A4A;
            --border-color: #D1D1D1;
            --card-bg: #FFFFFF;
            --danger-color: #A35D5D;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        nav {
            width: 100%; background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-around; padding: 15px 0;
        }

        nav button {
            background: none; border: none; color: var(--text-color);
            font-size: 14px; cursor: pointer; letter-spacing: 1px; padding: 10px;
        }

        nav button.active {
            color: var(--accent-color); font-weight: bold;
            border-bottom: 2px solid var(--accent-color);
        }

        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            background: var(--card-bg); border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }

        .filter-section { background: #EBEBE9; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .date-range { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .date-range input { padding: 8px; font-size: 12px; background: #fff; }

        button.primary {
            background-color: var(--accent-color); color: white; border: none;
            padding: 14px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 15px;
        }

        .item-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 15px; margin-bottom: 12px; border-radius: 8px; position: relative;
        }

        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-name { font-weight: bold; font-size: 16px; }
        .item-category { font-size: 10px; background: #EEE; padding: 2px 8px; border-radius: 12px; }
        .item-info { font-size: 12px; margin-top: 4px; opacity: 0.8; }
        
        .card-actions {
            display: flex; justify-content: flex-end; gap: 20px; margin-top: 10px; border-top: 1px solid #f0f0f0; padding-top: 10px;
        }
        .card-actions button {
            background: none; border: none; font-size: 12px; cursor: pointer; color: #999;
        }
        .card-actions .btn-edit:hover { color: var(--accent-color); text-decoration: underline; }
        .card-actions .btn-del:hover { color: var(--danger-color); text-decoration: underline; }

        .warning-box {
            background: #FFF5F5; border: 1px solid #FEB2B2; color: #C53030;
            padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px;
        }

        .summary-text { font-size: 13px; text-align: center; margin: 15px 0; color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('add-page')" id="btn-add" class="active">記錄</button>
    <button onclick="showPage('search-page')" id="btn-search">搜尋分析</button>
    <button onclick="showPage('backup-page')" id="btn-backup">備份</button>
</nav>

<div class="container">
    <!-- 頁面一：新增/編輯 -->
    <div id="add-page" class="page active">
        <h3 id="form-title" style="font-size: 16px; margin-bottom: 20px; font-weight: normal; text-align: center;">新增物品紀錄</h3>
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>名稱</label><input type="text" id="name" placeholder="請輸入物品名稱"></div>
        <div class="form-group">
            <label>分類</label>
            <select id="category">
                <option>食品飲料</option><option>3C</option><option>家電</option>
                <option>家具軟裝</option><option>工具文具</option><option>交通</option>
                <option>健康美容</option><option>視聽圖書</option><option>衣物配件</option><option>其他</option>
            </select>
        </div>
        <div class="form-group"><label>購買日期</label><input type="date" id="buyDate"></div>
        <div class="form-group"><label>金額</label><input type="number" id="price" placeholder="請輸入金額"></div>
        <div class="form-group"><label>到期日 (選填)</label><input type="date" id="expiryDate"></div>
        <div class="form-group"><label>保固到期日 (選填)</label><input type="date" id="warrantyDate"></div>
        <div class="form-group"><label>備註 (選填)</label><textarea id="note" rows="2" placeholder="相關備註..."></textarea></div>
        <button class="primary" id="save-btn" onclick="saveItem()">儲存紀錄</button>
        <button id="cancel-edit" style="display:none; background:none; border:none; width:100%; margin-top:10px; font-size:12px; cursor:pointer; color:#999;" onclick="clearForm(); showPage('search-page');">取消編輯</button>
    </div>

    <!-- 頁面二：搜尋分析 -->
    <div id="search-page" class="page">
        <div class="filter-section">
            <div class="filter-row">
                <!-- 分類搜尋選單 -->
                <select id="filterCategory" onchange="renderItems()" style="flex: 1; padding: 8px; font-size: 13px;">
                    <option value="all">所有分類</option>
                    <option>食品飲料</option><option>3C</option><option>家電</option>
                    <option>家具軟裝</option><option>工具文具</option><option>交通</option>
                    <option>健康美容</option><option>視聽圖書</option><option>衣物配件</option><option>其他</option>
                </select>
                <input type="text" id="searchInput" placeholder="搜尋名稱..." oninput="renderItems()" style="flex: 2; padding: 8px; font-size: 13px;">
            </div>
            <div class="date-range">
                <input type="date" id="filterStart" onchange="renderItems()">
                <span style="font-size:12px">至</span>
                <input type="date" id="filterEnd" onchange="renderItems()">
            </div>
        </div>
        <div id="expiry-alerts"></div>
        <div id="stats-area" class="summary-text"></div>
        <div id="item-list"></div>
    </div>

    <!-- 頁面三：備份 -->
    <div id="backup-page" class="page" style="text-align:center; padding-top:40px;">
        <p id="lastBackupDisplay" style="font-size:13px; margin-bottom:30px;">上次備份：無</p>
        <button class="primary" onclick="downloadBackup()">下載備份 (.json)</button>
        <button class="primary" style="background:#B2BEBF; margin-top:15px" onclick="document.getElementById('import-input').click()">讀取備份檔案</button>
        <input type="file" id="import-input" accept=".json" style="display:none" onchange="importBackup(event)">
    </div>
</div>

<script>
    let items = JSON.parse(localStorage.getItem('my_items')) || [];
    
    function resetFilters() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const todayStr = now.toLocaleDateString('en-CA'); 
        const yearStartStr = `${currentYear}-01-01`;
        
        document.getElementById('buyDate').value = todayStr;
        document.getElementById('filterStart').value = yearStartStr;
        document.getElementById('filterEnd').value = todayStr;
        if(document.getElementById('filterCategory')) document.getElementById('filterCategory').value = 'all';
    }

    resetFilters();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        const navBtn = document.getElementById('btn-' + pageId.split('-')[0]);
        if(navBtn) navBtn.classList.add('active');
        if(pageId === 'search-page') renderItems();
    }

    function saveItem() {
        const name = document.getElementById('name').value;
        const editId = document.getElementById('edit-id').value;
        if(!name) { alert('請輸入名稱'); return; }

        const itemData = {
            id: editId ? parseInt(editId) : Date.now(),
            name: name,
            category: document.getElementById('category').value,
            buyDate: document.getElementById('buyDate').value,
            price: document.getElementById('price').value || 0,
            expiryDate: document.getElementById('expiryDate').value,
            warrantyDate: document.getElementById('warrantyDate').value,
            note: document.getElementById('note').value
        };

        if(editId) {
            const index = items.findIndex(i => i.id === parseInt(editId));
            if(index !== -1) items[index] = itemData;
        } else {
            items.push(itemData);
        }

        localStorage.setItem('my_items', JSON.stringify(items));
        alert(editId ? '修改成功' : '儲存成功');
        clearForm();
        showPage('search-page');
    }

    function clearForm() {
        document.getElementById('edit-id').value = '';
        document.getElementById('name').value = '';
        document.getElementById('price').value = '';
        document.getElementById('note').value = '';
        document.getElementById('expiryDate').value = '';
        document.getElementById('warrantyDate').value = '';
        document.getElementById('form-title').innerText = '新增物品紀錄';
        document.getElementById('save-btn').innerText = '儲存紀錄';
        document.getElementById('cancel-edit').style.display = 'none';
        resetFilters();
    }

    function editItem(id) {
        const item = items.find(i => i.id === id);
        if(!item) return;
        document.getElementById('edit-id').value = item.id;
        document.getElementById('name').value = item.name;
        document.getElementById('category').value = item.category;
        document.getElementById('buyDate').value = item.buyDate;
        document.getElementById('price').value = item.price;
        document.getElementById('expiryDate').value = item.expiryDate;
        document.getElementById('warrantyDate').value = item.warrantyDate;
        document.getElementById('note').value = item.note;
        document.getElementById('form-title').innerText = '編輯物品資料';
        document.getElementById('save-btn').innerText = '確認更新';
        document.getElementById('cancel-edit').style.display = 'block';
        showPage('add-page');
    }

    function deleteItem(id) {
        if(confirm('確定要永久刪除此項紀錄嗎？')) {
            items = items.filter(i => i.id !== id);
            localStorage.setItem('my_items', JSON.stringify(items));
            renderItems();
        }
    }

    function renderItems() {
        const list = document.getElementById('item-list');
        const alerts = document.getElementById('expiry-alerts');
        const stats = document.getElementById('stats-area');
        
        const query = document.getElementById('searchInput').value.toLowerCase();
        const categoryFilter = document.getElementById('filterCategory').value; // 分類篩選值[cite: 2]
        const startVal = document.getElementById('filterStart').value;
        const endVal = document.getElementById('filterEnd').value;
        
        list.innerHTML = ''; alerts.innerHTML = '';
        const today = new Date(); today.setHours(0,0,0,0);
        const thirtyDaysLater = new Date(); thirtyDaysLater.setDate(today.getDate() + 30);

        let rangeTotal = 0;

        // 警示邏輯[cite: 2]
        items.forEach(item => {
            const expD = item.expiryDate ? new Date(item.expiryDate) : null;
            const warD = item.warrantyDate ? new Date(item.warrantyDate) : null;
            if((expD && expD <= thirtyDaysLater && expD >= today) || (warD && warD <= thirtyDaysLater && warD >= today)) {
                alerts.innerHTML += `<div class="warning-box">🔔 即將到期：${item.name} (${item.expiryDate || item.warrantyDate})</div>`;
            }
        });

        // 綜合篩選：關鍵字 + 分類 + 日期區間
        const filtered = items.filter(item => {
            const matchName = item.name.toLowerCase().includes(query);
            const matchCategory = categoryFilter === 'all' || item.category === categoryFilter;
            const matchDate = item.buyDate >= startVal && item.buyDate <= endVal;
            return matchName && matchCategory && matchDate;
        });

        filtered.sort((a,b) => b.buyDate.localeCompare(a.buyDate)).forEach(item => {
            rangeTotal += parseFloat(item.price);
            list.innerHTML += `
                <div class="item-card">
                    <div class="item-header">
                        <span class="item-name">${item.name}</span>
                        <span class="item-category">${item.category}</span>
                    </div>
                    <div class="item-info">📅 購買日：${item.buyDate}</div>
                    <div class="item-info">💰 金額：$${parseFloat(item.price).toLocaleString()}</div>
                    ${item.warrantyDate ? `<div class="item-info" style="color:var(--accent-color)">🛡️ 保固：${item.warrantyDate}</div>` : ''}
                    <div class="card-actions">
                        <button class="btn-edit" onclick="editItem(${item.id})">編輯</button>
                        <button class="btn-del" onclick="deleteItem(${item.id})">刪除</button>
                    </div>
                </div>`;
        });
        stats.innerText = `篩選條件下支出總計：$${rangeTotal.toLocaleString()}`;
    }

    function downloadBackup() {
        const dataStr = JSON.stringify(items, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `物品備份_${new Date().toLocaleDateString('en-CA')}.json`;
        a.click();
        localStorage.setItem('last_backup', new Date().toLocaleString());
        document.getElementById('lastBackupDisplay').innerText = `上次備份：${localStorage.getItem('last_backup')}`;
    }

    function importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if(Array.isArray(imported)) {
                    items = imported;
                    localStorage.setItem('my_items', JSON.stringify(items));
                    alert('備份匯入完成');
                    renderItems();
                }
            } catch(err) { alert('檔案格式不正確'); }
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
