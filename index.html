<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品紀錄 App</title>
    <style>
        :root {
            --bg-color: #F5F5F3;
            --accent-color: #8A9A5B;
            --text-color: #4A4A4A;
            --border-color: #D1D1D1;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 1px;
            padding: 10px;
        }

        nav button.active {
            color: var(--accent-color);
            font-weight: bold;
            border-bottom: 2px solid var(--accent-color);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        .page { display: none; }
        .page.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .photo-placeholder {
            width: 100%;
            height: 180px;
            border: 1px dashed var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            cursor: pointer;
            background: #FAFAFA;
            color: #999;
            font-size: 13px;
        }

        button.primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
        }

        .item-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
        }

        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-name { font-weight: bold; font-size: 16px; }
        .item-category { font-size: 10px; background: #EEE; padding: 2px 8px; border-radius: 12px; }
        .item-info { font-size: 12px; margin-top: 4px; opacity: 0.8; }
        .warning-box {
            background: #FFF5F5;
            border: 1px solid #FEB2B2;
            color: #C53030;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .summary-text {
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('add-page')" id="btn-add" class="active">記錄</button>
    <button onclick="showPage('search-page')" id="btn-search">搜尋分析</button>
    <button onclick="showPage('backup-page')" id="btn-backup">備份</button>
</nav>

<div class="container">
    <!-- 頁面一：新增紀錄 -->
    <div id="add-page" class="page active">
        <div class="photo-placeholder" onclick="document.getElementById('photo-input').click()">
            <span id="photo-text">📸 開啟相機或選取照片</span>
            <input type="file" id="photo-input" accept="image/*" style="display:none">
        </div>
        <div class="form-group"><label>名稱</label><input type="text" id="name"></div>
        <div class="form-group">
            <label>分類</label>
            <select id="category">
                <option>食品飲料</option><option>3C</option><option>家電</option>
                <option>家具軟裝</option><option>工具文具</option><option>交通</option>
                <option>健康美容</option><option>視聽圖書</option><option>衣物配件</option><option>其他</option>
            </select>
        </div>
        <div class="form-group"><label>購買日期</label><input type="date" id="buyDate"></div>
        <div class="form-group"><label>金額</label><input type="number" id="price"></div>
        <div class="form-group"><label>到期日 (選填)</label><input type="date" id="expiryDate"></div>
        <div class="form-group"><label>保固到期日 (選填)</label><input type="date" id="warrantyDate"></div>
        <div class="form-group"><label>備註 (選填)</label><textarea id="note" rows="2"></textarea></div>
        <button class="primary" onclick="saveItem()">儲存紀錄</button>
    </div>

    <!-- 頁面二：搜尋分析 -->
    <div id="search-page" class="page">
        <input type="text" id="searchInput" placeholder="搜尋關鍵字..." oninput="renderItems()" style="margin-bottom:15px">
        <div id="expiry-alerts"></div>
        <div id="stats-area" class="summary-text"></div>
        <div id="item-list"></div>
    </div>

    <!-- 頁面三：備份 -->
    <div id="backup-page" class="page" style="text-align:center; padding-top:40px;">
        <p style="font-size:14px; opacity:0.7;">資料僅儲存於您的瀏覽器中</p>
        <p id="lastBackupDisplay" style="font-size:13px; margin-bottom:30px;">上次備份：無</p>
        <button class="primary" onclick="downloadBackup()">下載備份 (.json)</button>
        <button class="primary" style="background:#B2BEBF; margin-top:15px" onclick="document.getElementById('import-input').click()">讀取備份檔案</button>
        <input type="file" id="import-input" accept=".json" style="display:none" onchange="importBackup(event)">
    </div>
</div>

<script>
    // 初始化資料
    let items = JSON.parse(localStorage.getItem('my_items')) || [];
    document.getElementById('buyDate').valueAsDate = new Date();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + pageId.split('-')[0]).classList.add('active');
        if(pageId === 'search-page') renderItems();
        if(pageId === 'backup-page') updateBackupDateDisplay();
    }

    function saveItem() {
        const name = document.getElementById('name').value;
        if(!name) { alert('請輸入名稱'); return; }

        const newItem = {
            id: Date.now(),
            name: name,
            category: document.getElementById('category').value,
            buyDate: document.getElementById('buyDate').value,
            price: document.getElementById('price').value || 0,
            expiryDate: document.getElementById('expiryDate').value,
            warrantyDate: document.getElementById('warrantyDate').value,
            note: document.getElementById('note').value
        };

        items.push(newItem);
        localStorage.setItem('my_items', JSON.stringify(items));
        alert('儲存成功');
        clearForm();
        showPage('search-page');
    }

    function clearForm() {
        document.getElementById('name').value = '';
        document.getElementById('price').value = '';
        document.getElementById('note').value = '';
        document.getElementById('expiryDate').value = '';
        document.getElementById('warrantyDate').value = '';
    }

    function renderItems() {
        const list = document.getElementById('item-list');
        const alerts = document.getElementById('expiry-alerts');
        const stats = document.getElementById('stats-area');
        const query = document.getElementById('searchInput').value.toLowerCase();
        
        list.innerHTML = '';
        alerts.innerHTML = '';
        
        const today = new Date();
        const thirtyDaysLater = new Date();
        thirtyDaysLater.setDate(today.getDate() + 30);

        let totalAmount = 0;
        const currentYearStart = new Date(new Date().getFullYear(), 0, 1);

        // 篩選與警示邏輯
        items.forEach(item => {
            const buyD = new Date(item.buyDate);
            // 統計今年起的金額
            if (buyD >= currentYearStart && buyD <= today) {
                totalAmount += parseFloat(item.price);
            }

            // 檢查 30 天內到期或保固[cite: 2]
            const expD = item.expiryDate ? new Date(item.expiryDate) : null;
            const warD = item.warrantyDate ? new Date(item.warrantyDate) : null;

            if((expD && expD <= thirtyDaysLater && expD >= today) || (warD && warD <= thirtyDaysLater && warD >= today)) {
                alerts.innerHTML += `<div class="warning-box">📌 即將到期：${item.name} (${item.expiryDate || item.warrantyDate})</div>`;
            }
        });

        stats.innerText = `今年累計支出 (01/01 - 今日)：$${totalAmount.toLocaleString()}`;

        // 搜尋過濾
        const filtered = items.filter(i => i.name.toLowerCase().includes(query));
        filtered.sort((a,b) => new Date(b.buyDate) - new Date(a.buyDate)).forEach(item => {
            list.innerHTML += `
                <div class="item-card">
                    <div class="item-header">
                        <span class="item-name">${item.name}</span>
                        <span class="item-category">${item.category}</span>
                    </div>
                    <div class="item-info">📅 購買日：${item.buyDate}</div>
                    <div class="item-info">💰 金額：$${parseFloat(item.price).toLocaleString()}</div>
                    ${item.warrantyDate ? `<div class="item-info" style="color:#8A9A5B">🛡️ 保固至：${item.warrantyDate}</div>` : ''}
                    ${item.note ? `<div class="item-info" style="font-style:italic; border-top:1px solid #f0f0f0; margin-top:8px; padding-top:4px;">${item.note}</div>` : ''}
                </div>
            `;
        });
    }

    function downloadBackup() {
        const dataStr = JSON.stringify(items, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `物品備份_${new Date().toISOString().slice(0,10)}.json`;
        link.click();
        localStorage.setItem('last_backup', new Date().toLocaleString());
        updateBackupDateDisplay();
    }

    function importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                items = JSON.parse(e.target.result);
                localStorage.setItem('my_items', JSON.stringify(items));
                alert('匯入完成！');
                renderItems();
            } catch(err) { alert('檔案格式不正確'); }
        };
        reader.readAsText(file);
    }

    function updateBackupDateDisplay() {
        document.getElementById('lastBackupDisplay').innerText = `上次備份：${localStorage.getItem('last_backup') || '尚未備份'}`;
    }
</script>
</body>
</html>
